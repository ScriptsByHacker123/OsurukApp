name: APK Derleyici

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Çek
        uses: actions/checkout@v4

      - name: Sistem Gereksinimlerini Kur
        run: |
          sudo apt update
          sudo apt install -y build-essential git ffmpeg libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev \
          libavformat-dev libavcodec-dev zlib1g-dev libsqlite3-dev \
          sqlite3 bzip2 libbz2-dev libssl-dev gcc
          pip3 install --user --upgrade buildozer cython virtualenv

      - name: APK Derle
        run: |
          export PATH=$PATH:$HOME/.local/bin
          buildozer android debug

      - name: APK Dosyasını Yükle (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: MuzikAsistani-APK
          path: bin/*.apk
          
